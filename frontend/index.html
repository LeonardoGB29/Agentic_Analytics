/* ── Helpers ────────────────────────────────────────────────────────────────── */
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtNum(n){ return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ' '); }
function fmtTime(v){ return v != null ? v.toFixed(1).replace('.', ',') + ' s' : '—'; }
function fmtCpu(v){ return v != null ? v.toFixed(1).replace('.', ',') + '%' : '—'; }
function fmtMem(v){ return v != null ? v.toFixed(1).replace('.', ',') + ' MB' : '—'; }
function fmtPct(v){ return (Number.isFinite(v)?v:0).toFixed(1).replace('.', ',') + '%'; }
function cap(s){ s=String(s||''); return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }
function mix(t){
  const a=[0x15,0x47,0x9B], b=[0x8c,0xc6,0x3f];
  return '#' + a.map((v,j)=>Math.round(v+(b[j]-v)*t).toString(16).padStart(2,'0')).join('');
}
function filterEngine(bars){
  const e = state.engine;
  if(e==='hive')  return bars.filter(b=>b.label==='Hive');
  if(e==='spark') return bars.filter(b=>b.label==='Spark');
  return bars;
}
function timeBarsFor(r){
  let bars=[{label:'Hive',raw:r.hive,color:'#15479B'},{label:'Spark',raw:r.spark,color:'#8CC63F'}].filter(b=>b.raw!=null);
  bars=filterEngine(bars);
  const max=Math.max(0.001,...bars.map(b=>b.raw));
  return bars.map(b=>({label:b.label,color:b.color,pct:Math.max(3,b.raw/max*100),value:fmtTime(b.raw)}));
}
function cpuBarsFor(r){
  let bars=[{label:'Hive',raw:r.hive_cpu,color:'#15479B'},{label:'Spark',raw:r.spark_cpu,color:'#8CC63F'}].filter(b=>b.raw!=null);
  bars=filterEngine(bars);
  return bars.map(b=>({label:b.label,color:b.color,pct:Math.max(3,Math.min(b.raw,100)),value:fmtCpu(b.raw)}));
}
function memBarsFor(r){
  let bars=[{label:'Hive',raw:r.hive_mem,color:'#15479B'},{label:'Spark',raw:r.spark_mem,color:'#8CC63F'}].filter(b=>b.raw!=null);
  bars=filterEngine(bars);
  const max=Math.max(0.001,...bars.map(b=>b.raw));
  return bars.map(b=>({label:b.label,color:b.color,pct:Math.max(3,b.raw/max*100),value:fmtMem(b.raw)}));
}
function chartRowsFor(r){
  const rows=(r.chart||[]).map((c,idx)=>({idx,label:c.label,value:Number(c.value)||0,valueFmt:c.valueFmt||fmtNum(c.value)}));
  rows.sort((a,b)=>state.chartSort==='asc' ? a.value-b.value : b.value-a.value);
  return rows;
}
function chartStats(r){
  const rows=chartRowsFor(r);
  const total=rows.reduce((a,c)=>a+Math.max(0,c.value),0);
  const max=Math.max(0.001,...rows.map(c=>Math.abs(c.value)));
  return {rows,total,max};
}
function errorResponse(message){

/* ── SKILL 1 (local) — intención. Al conectar Gemini, lo resuelve el servidor. ── */
function infer(text){
  const t=(text||'').toLowerCase();
  if(t.includes('cliente'))                     return 'clientes';
  if(t.includes('tienda'))                      return 'tienda';
  if(t.includes('mes')||t.includes('mensual'))  return 'mes';
  if(t.includes('ingreso'))                     return 'mes';
  return 'productos';
}

/* ── Envío de la pregunta ───────────────────────────────────────────────────────
   - Servido por HTTP (backend/server.py corriendo)  →  llama al API real:
       /api/query → skill1 → skill2 → skill3 → skill4 → skill5
   - Abierto con doble clic (file://)                →  usa datos mock locales.
   Así el mismo archivo sirve para demo offline y para el sistema completo.
   ──────────────────────────────────────────────────────────────────────────────── */
const USE_BACKEND = location.protocol === 'http:' || location.protocol === 'https:';

function send(text){
  text=(text||'').trim();
  if(!text || state.thinking) return;
  state.messages.push({role:'user', text});
  state.input='';
  state.thinking=true;
  render();

  if(USE_BACKEND) sendBackend(text);
  else            sendMock(text);
}

/* Backend real (Flask) */
function sendBackend(text){
  fetch('/api/query', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({question:text, engine:state.engine}),
  })
  .then(async r=>{
    const data = await r.json().catch(()=>null);
    if(!r.ok){
      const detail = data && (data.error || data.message || data.detail);
      throw new Error(detail || 'HTTP '+r.status);
    }
    return data;
  })
  .then(resp=>{
    state.messages.push({role:'agent', resp, tab:'resumen'});  // resp = salida de skill_5_to_json
    state.thinking=false;
    render();
  })
  .catch(err=>{
    console.error('[Agente] backend falló:', err);
    state.messages.push({
      role:'agent',
      resp:errorResponse(`${err.message || err}. Prueba una consulta del catalogo, por ejemplo: productos mas vendidos, ventas por tienda, ventas por mes o mejores clientes.`),
      tab:'resumen',
    });
    state.thinking=false;
    render();
  });
}

/* Datos mock (offline). skill2/3/4/5 representados por RESPONSES[intent]. */
function sendMock(text){
  const intent=infer(text);  // skill1 local
  const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  clearTimeout(_timer);
  _timer=setTimeout(()=>{
    state.messages.push({role:'agent', resp:RESPONSES[intent], tab:'resumen'});
    state.thinking=false;
    render();
  }, reduced ? 350 : 950);
}

  const sh=state.show, defs=[];

  if(sh.grafica)            defs.push({key:'grafica',    label:'Gráfica'});
  return defs;
}

        <span style="font-size:11px;">${sec.config?'▾':'▸'}</span>
      </button>
      ${sec.config ? `<div style="margin-top:13px;">
        <div style="font-size:12px;color:#C9D1D9;margin-bottom:7px;">Motor de ejecución</div>

        <span style="font-size:10.5px;letter-spacing:0.09em;text-transform:uppercase;font-weight:600;">Salida del agente</span>

    </div>

    return renderAgent(msg, i);

  const welcomeHtml = showWelcome ? `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:60px 20px;text-align:center;">
      <div style="width:64px;height:64px;border-radius:18px;background:linear-gradient(150deg,#15479B 0%,#8CC63F 100%);display:flex;align-items:flex-end;justify-content:center;gap:5px;padding:14px;box-shadow:0 10px 30px rgba(21,71,155,0.35);">
        <div style="width:6px;height:12px;border-radius:3px;background:rgba(255,255,255,0.85);"></div>
        <div style="width:6px;height:20px;border-radius:3px;background:rgba(255,255,255,0.95);"></div>
        <div style="width:6px;height:16px;border-radius:3px;background:rgba(255,255,255,0.75);"></div>

      <div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;">¿En qué puedo ayudarte?</div>
        <div style="font-size:14px;color:#9DA1A6;max-width:420px;line-height:1.6;">Haz una pregunta en lenguaje natural sobre tus datos de retail TPC-DS y el agente generará SQL, lo ejecutará y presentará los resultados.</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
        ${EXAMPLES.map((e,k)=>`<button type="button" class="chip" data-act="ex" data-arg="${k}" style="font-size:12.5px;color:#C9D1D9;background:#161B26;border:1px solid rgba(255,255,255,0.1);border-radius:999px;padding:8px 16px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;">${esc(e)}</button>`).join('')}

    </div>` : '';

  const thinkingHtml = state.thinking ? `
    <div style="display:flex;gap:12px;align-self:flex-start;max-width:96%;">
      <div style="flex:none;width:36px;height:36px;border-radius:10px;background:linear-gradient(160deg,#1E2533,#161B26);border:1px solid rgba(141,198,63,0.3);display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:8px;">
        <div style="width:4px;height:8px;border-radius:2px;background:#15479B;"></div>
        <div style="width:4px;height:14px;border-radius:2px;background:#4E7E6E;"></div>
        <div style="width:4px;height:11px;border-radius:2px;background:#8CC63F;"></div>
      </div>
      <div style="background:#161B26;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:15px 18px;display:flex;align-items:center;gap:6px;">
        <span style="width:7px;height:7px;border-radius:999px;background:#9DA1A6;animation:scblink 1.2s infinite;"></span>
        <span style="width:7px;height:7px;border-radius:999px;background:#9DA1A6;animation:scblink 1.2s infinite;animation-delay:.2s;"></span>
        <span style="width:7px;height:7px;border-radius:999px;background:#9DA1A6;animation:scblink 1.2s infinite;animation-delay:.4s;"></span>
        <span style="font-size:12.5px;color:#9DA1A6;margin-left:8px;">Interpretando y generando SQL…</span>
      </div>
    </div>` : '';

  const main = `
  <main data-main style="flex:1;min-width:0;display:flex;flex-direction:column;height:100%;">

    <div style="display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:13px clamp(16px,3vw,30px);border-bottom:1px solid rgba(157,161,166,0.14);background:rgba(22,27,38,0.6);flex:none;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:#E6E8EC;">Consola de consultas</div>
        <span style="display:flex;align-items:center;gap:7px;font-size:11.5px;color:#9DA1A6;background:rgba(157,161,166,0.1);border:1px solid rgba(255,255,255,0.06);border-radius:999px;padding:4px 11px;">Motor: <strong style="color:#C9D1D9;font-weight:600;">${engineLabel}</strong></span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:14px;background:#161B26;border:1px solid rgba(255,255,255,0.06);border-radius:999px;padding:7px 15px;">
          <span style="display:flex;align-items:center;gap:7px;font-size:12.5px;color:#C9D1D9;font-weight:500;"><span style="width:9px;height:9px;border-radius:3px;background:#15479B;"></span>Hive</span>
          <span style="width:1px;height:13px;background:rgba(255,255,255,0.1);"></span>
          <span style="display:flex;align-items:center;gap:7px;font-size:12.5px;color:#C9D1D9;font-weight:500;"><span style="width:9px;height:9px;border-radius:3px;background:#8CC63F;"></span>Spark</span>
        </div>
        <span style="display:flex;align-items:center;gap:7px;font-size:12px;color:#9DA1A6;"><span style="width:8px;height:8px;border-radius:999px;background:#8CC63F;animation:scpulse 2s infinite;"></span>en línea</span>

    <div data-chat id="chat" style="flex:1;min-height:0;overflow-y:auto;padding:clamp(16px,2.5vw,28px) clamp(16px,3vw,30px);">

        ${messagesHtml}
        ${thinkingHtml}

    <div style="padding:clamp(12px,1.8vw,18px) clamp(16px,3vw,30px) clamp(16px,2.5vw,20px);border-top:1px solid rgba(157,161,166,0.14);background:#0E1320;flex:none;">
      <div style="display:flex;gap:10px;align-items:stretch;max-width:940px;margin:0 auto;">
        <input id="q" class="q" placeholder="Pregunta lo que quieras ..." value="${esc(state.input)}" style="flex:1;min-width:0;background:#161B26;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 16px;color:#E6E8EC;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;" />

    </div>

  </main>`;

  document.getElementById('app').innerHTML =
    `<div data-app style="height:100vh;overflow:hidden;display:flex;background-color:#0E1320;background-image:radial-gradient(rgba(141,198,63,0.05) 1px, transparent 1px), radial-gradient(rgba(21,71,155,0.07) 1px, transparent 1px);background-size:30px 30px;background-position:0 0, 15px 15px;color:#E6E8EC;">${sidebar}${main}</div>`;

  // scroll abajo + foco
  const chat=document.getElementById('chat');
  if(chat) chat.scrollTop=chat.scrollHeight;
  const q=document.getElementById('q');
  if(q && !('ontouchstart' in window)) q.focus();
}

/* — Render de un mensaje del agente — */
function renderAgent(msg, i){
  const r=msg.resp;
  const sh=state.show;
  const defs=tabDefs();
  const avail=defs.map(t=>t.key);
  const activeTab=(msg.tab && avail.includes(msg.tab)) ? msg.tab : (avail[0]||null);
  const bothEngines=state.engine==='ambos';
  const speedup=(r.hive!=null && r.spark!=null) ? (r.hive/r.spark).toFixed(1).replace('.',',') : '—';
  const hasComparison = r.hive!=null && r.spark!=null;
  const rowCount = Array.isArray(r.rows) ? r.rows.length : 0;

  const avatar=`<div style="flex:none;width:36px;height:36px;border-radius:10px;background:linear-gradient(160deg,#1E2533,#161B26);border:1px solid rgba(141,198,63,0.3);display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:8px;">
    <div style="width:4px;height:8px;border-radius:2px;background:#15479B;"></div>
    <div style="width:4px;height:14px;border-radius:2px;background:#4E7E6E;"></div>
    <div style="width:4px;height:11px;border-radius:2px;background:#8CC63F;"></div>
  </div>`;

  if(avail.length===0){
    return `<div style="display:flex;gap:12px;align-self:flex-start;max-width:96%;width:100%;">${avatar}
      <div style="flex:1;min-width:0;background:#161B26;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:6px 18px 18px;box-shadow:0 8px 30px rgba(0,0,0,0.25);">
        <div style="padding:18px 0 6px;font-size:13px;color:#9DA1A6;">Activa al menos una salida en <strong style="color:#C9D1D9;">Salida del agente</strong> (panel izquierdo).</div>
      </div></div>`;
  }

  const tabsBar=`<div style="display:flex;gap:20px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:16px;overflow-x:auto;">
    ${defs.map(t=>{
      const on=t.key===activeTab;
      const st=`background:transparent;border:none;cursor:pointer;padding:10px 2px;font-size:13px;font-family:'Inter',sans-serif;white-space:nowrap;transition:color .2s;`+(on?'color:#fff;font-weight:600;border-bottom:2px solid #8CC63F;':'color:#9DA1A6;font-weight:500;border-bottom:2px solid transparent;');
      return `<button type="button" data-act="tab" data-msg="${i}" data-arg="${t.key}" style="${st}">${t.label}</button>`;
    }).join('')}
  </div>`;

  let body='';

  if(activeTab==='resumen'){
    body=`<div style="display:flex;flex-direction:column;gap:15px;padding-top:2px;">
      <div>
        <div style="font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:#8CC63F;font-weight:600;margin-bottom:8px;">Insight</div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:clamp(30px,5vw,40px);font-weight:700;color:#fff;line-height:1;letter-spacing:-0.02em;">${esc(r.heroValue)} <span style="font-size:0.42em;color:#8CC63F;font-weight:600;">${esc(r.heroUnit)}</span></div>
        <div style="font-size:12.5px;color:#9DA1A6;margin-top:8px;">${esc(r.heroLabel)}</div>
      </div>
      <div style="font-size:14.5px;line-height:1.6;color:#E6E8EC;">${esc(r.summary)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${hasComparison ? `<span style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:#8CC63F;background:rgba(141,198,63,0.1);border:1px solid rgba(141,198,63,0.28);border-radius:999px;padding:5px 11px;font-weight:600;"><span style="width:6px;height:6px;border-radius:999px;background:#8CC63F;"></span>Spark ${speedup}× más rápido</span>` : ''}
        <span style="font-size:11.5px;color:#9DA1A6;background:rgba(157,161,166,0.1);border:1px solid rgba(157,161,166,0.2);border-radius:999px;padding:5px 11px;">${fmtNum(r.matched)} coincidencias</span>
        <span style="font-size:11.5px;color:#9DA1A6;background:rgba(157,161,166,0.1);border:1px solid rgba(157,161,166,0.2);border-radius:999px;padding:5px 11px;">${rowCount} filas recuperadas</span>
      </div>
    </div>`;
  }
  else if(activeTab==='ejecucion'){
    const both = bothEngines ? `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#0E1320;border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:13px 15px;">
        <span style="display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#C9D1D9;"><span style="width:9px;height:9px;border-radius:3px;background:#15479B;"></span>Hive ${fmtTime(r.hive)}</span>
        <span style="display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#C9D1D9;"><span style="width:9px;height:9px;border-radius:3px;background:#8CC63F;"></span>Spark ${fmtTime(r.spark)}</span>
        <span style="font-size:13px;color:#8CC63F;font-weight:600;margin-left:auto;">→ Spark ${speedup}× más rápido</span>
      </div>` : '';
    const sqlBlock = sh.sql ? `<div>
        <div style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#9DA1A6;font-weight:600;">SQL generado</div>
        <pre style="margin:7px 0 0;background:#0E1320;border:1px solid rgba(255,255,255,0.05);border-left:3px solid #8CC63F;border-radius:10px;padding:13px 15px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.65;color:#C9D1D9;overflow-x:auto;white-space:pre;">${esc(r.sql)}</pre>
      </div>` : '';
    const _metricBar = (tb) => `<div style="display:flex;align-items:center;gap:10px;margin-top:9px;">
          <span style="display:flex;align-items:center;gap:6px;width:62px;font-size:12px;color:#C9D1D9;"><span style="width:8px;height:8px;border-radius:2px;background:${tb.color};"></span>${tb.label}</span>
          <div style="flex:1;height:9px;border-radius:999px;background:rgba(157,161,166,0.1);overflow:hidden;">
            <div style="height:100%;border-radius:999px;transition:width .6s cubic-bezier(.2,.8,.2,1);width:${tb.pct}%;background:${tb.color};"></div>
          </div>
          <span style="width:72px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;color:#E6E8EC;">${tb.value}</span>
        </div>`;
    const timeBlock = sh.tiempos ? `<div>
        <div style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#9DA1A6;font-weight:600;">Tiempo de ejecución</div>
        ${timeBarsFor(r).map(_metricBar).join('')}
      </div>` : '';
    const _cpuBars = cpuBarsFor(r);
    const cpuBlock = sh.tiempos && _cpuBars.length ? `<div>
        <div style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#9DA1A6;font-weight:600;">Uso de CPU</div>
        ${_cpuBars.map(_metricBar).join('')}
      </div>` : '';
    const _memBars = memBarsFor(r);
    const memBlock = sh.tiempos && _memBars.length ? `<div>
        <div style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#9DA1A6;font-weight:600;">Uso de memoria</div>
        ${_memBars.map(_metricBar).join('')}
      </div>` : '';
    body=`<div style="display:flex;flex-direction:column;gap:16px;padding-top:2px;">${both}${sqlBlock}${timeBlock}${cpuBlock}${memBlock}</div>`;
  }
  else if(activeTab==='resultados'){
    const sourceRows=Array.isArray(r.rows) ? r.rows : [];
    const visN=state.rowsVisible>=9999 ? sourceRows.length : state.rowsVisible;
    const visRows=sourceRows.slice(0,visN);
    const cstats=chartStats(r);
    const chartByLabel=new Map(cstats.rows.map(c=>[String(c.label),c]));
    const rowsOpts=ROWS_OPTS.map(o=>{
      const on=state.rowsVisible===o.val;
      const st=`padding:5px 10px;font-size:11.5px;font-weight:600;border:none;cursor:pointer;border-radius:6px;transition:all .2s;font-family:'Inter',sans-serif;`+(on?'background:rgba(141,198,63,0.18);color:#8CC63F;':'background:transparent;color:#9DA1A6;');
      return `<button type="button" data-act="rows" data-arg="${o.val}" style="${st}">${o.label}</button>`;
    }).join('');
    const rowsCells=visRows.map((row,ri)=>{
      const metric=chartByLabel.get(String(row[0]));
      const share=metric && cstats.total>0 ? metric.value/cstats.total*100 : 0;
      const width=metric ? Math.max(3,Math.abs(metric.value)/cstats.max*100) : 0;
      return `<div style="display:grid;grid-template-columns:46px minmax(110px,1fr) minmax(120px,0.75fr) 84px;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);">
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B7280;">#${ri+1}</div>
        <div style="min-width:0;font-size:13px;color:#E6E8EC;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(row[0])}</div>
        <div style="height:8px;border-radius:999px;background:rgba(157,161,166,0.10);overflow:hidden;">
          <div style="height:100%;width:${width}%;border-radius:999px;background:linear-gradient(90deg,#15479B,#8CC63F);"></div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#8CC63F;">${esc(row[1])}</div>
          <div style="font-size:10.5px;color:#6B7280;margin-top:2px;">${fmtPct(share)}</div>
        </div>
      </div>`;
    }).join('');
    body=`<div style="display:flex;flex-direction:column;gap:12px;padding-top:2px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
        <div style="font-size:12.5px;color:#C9D1D9;">Mostrando <strong style="color:#fff;">${visRows.length}</strong> de ${sourceRows.length} filas <span style="color:#6B7280;">· ${fmtNum(r.matched)} coincidencias</span></div>
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:11px;color:#6B7280;">Ver</span>
          <div style="display:flex;gap:3px;background:#0E1320;border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:3px;">${rowsOpts}</div>
        </div>
      </div>
      <div style="border:1px solid rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;">
        <div>
          <div style="display:grid;grid-template-columns:46px minmax(110px,1fr) minmax(120px,0.75fr) 84px;gap:10px;padding:9px 12px;font-size:10.5px;letter-spacing:0.06em;text-transform:uppercase;color:#9DA1A6;background:rgba(157,161,166,0.06);font-weight:700;border-bottom:1px solid rgba(255,255,255,0.07);">
            <div>Rank</div><div>${esc(r.cols[0])}</div><div>Comparacion</div><div style="text-align:right;">${esc(r.cols[1])}</div>
          </div>
          ${rowsCells}
        </div>
      </div>
    </div>`;
  }
  else if(activeTab==='grafica'){
    const n=(r.chart||[]).length;
    if(!n){
      body=`<div style="display:flex;flex-direction:column;gap:10px;padding-top:2px;">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:#E6E8EC;">${esc(r.chartTitle||'Sin grafica')}</div>
        <div style="font-size:13px;color:#9DA1A6;background:#0E1320;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:13px 15px;">No hay una metrica numerica suficiente para dibujar barras.</div>
      </div>`;
    } else {
      const rows=chartRowsFor(r);
      const total=rows.reduce((a,c)=>a+Math.max(0,c.value),0);
      const max=Math.max(0.001,...rows.map(c=>Math.abs(c.value)));
      const selectedRaw=Number.isInteger(msg.chartPick) ? msg.chartPick : rows[0].idx;
      const selected=rows.find(c=>c.idx===selectedRaw) || rows[0];
      const top=rows[0];
      const selectedShare=total>0 ? selected.value/total*100 : 0;
      const topShare=total>0 ? top.value/total*100 : 0;
      const modeBtns=[
        {key:'valor',label:'Valor'},
        {key:'porcentaje',label:'Participacion'},
      ].map(o=>{
        const on=state.chartMode===o.key;
        const st=`border:none;border-radius:7px;padding:6px 9px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;`+(on?'background:#8CC63F;color:#0E1320;':'background:transparent;color:#9DA1A6;');
        return `<button type="button" data-act="chartMode" data-arg="${o.key}" style="${st}">${o.label}</button>`;
      }).join('');
      const sortBtns=[
        {key:'desc',label:'Mayor'},
        {key:'asc',label:'Menor'},
      ].map(o=>{
        const on=state.chartSort===o.key;
        const st=`border:none;border-radius:7px;padding:6px 9px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;`+(on?'background:rgba(21,71,155,0.95);color:#fff;':'background:transparent;color:#9DA1A6;');
        return `<button type="button" data-act="chartSort" data-arg="${o.key}" style="${st}">${o.label}</button>`;
      }).join('');
      const vizBtns=[
        {key:'ranking',label:'Ranking'},
        {key:'donut',label:'Donut'},
        {key:'columnas',label:'Columnas'},
      ].map(o=>{
        const on=state.chartViz===o.key;
        const st=`border:none;border-radius:7px;padding:6px 9px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;`+(on?'background:rgba(255,255,255,0.92);color:#0E1320;':'background:transparent;color:#9DA1A6;');
        return `<button type="button" data-act="chartViz" data-arg="${o.key}" style="${st}">${o.label}</button>`;
      }).join('');
      const bars=rows.map((c,ci)=>{
        const share=total>0 ? c.value/total*100 : 0;
        const width=state.chartMode==='porcentaje' ? Math.max(3,share) : Math.max(3,Math.abs(c.value)/max*100);
        const color=c.idx===selected.idx ? '#8CC63F' : mix(n>1?ci/(n-1):0);
        const on=c.idx===selected.idx;
        const rank=ci+1;
        const display=state.chartMode==='porcentaje' ? fmtPct(share) : c.valueFmt;
        return `<button type="button" data-act="chartPick" data-msg="${i}" data-arg="${c.idx}" title="${esc(c.label)} · ${esc(c.valueFmt)} · ${fmtPct(share)} del total" style="width:100%;display:grid;grid-template-columns:42px minmax(96px,180px) 1fr 88px;align-items:center;gap:10px;background:${on?'rgba(141,198,63,0.10)':'transparent'};border:1px solid ${on?'rgba(141,198,63,0.32)':'transparent'};border-radius:10px;padding:7px 8px;cursor:pointer;text-align:left;transition:background .18s,border-color .18s,transform .18s;">
          <span style="display:flex;align-items:center;justify-content:center;width:28px;height:24px;border-radius:7px;background:${on?'rgba(141,198,63,0.20)':'rgba(157,161,166,0.10)'};font-family:'JetBrains Mono',monospace;font-size:11px;color:${on?'#8CC63F':'#9DA1A6'};">#${rank}</span>
          <span style="min-width:0;font-size:12.5px;font-weight:600;color:${on?'#fff':'#C9D1D9'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.label)}</span>
          <span style="position:relative;height:24px;border-radius:8px;background:rgba(157,161,166,0.10);overflow:hidden;">
            <span style="position:absolute;inset:0 auto 0 0;width:${width}%;min-width:5px;border-radius:8px;background:${color};box-shadow:${on?'0 0 18px rgba(141,198,63,0.35)':'none'};transition:width .55s cubic-bezier(.2,.8,.2,1);"></span>
            <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:10.5px;font-weight:700;color:${width>36?'rgba(14,19,32,0.88)':'#9DA1A6'};">${fmtPct(share)}</span>
          </span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${on?'#fff':'#E6E8EC'};text-align:right;white-space:nowrap;">${esc(display)}</span>
        </button>`;
      }).join('');
      let acc=0;
      const donutSegments=rows.slice(0,6).map((c,ci)=>{
        const share=total>0 ? Math.max(0,c.value)/total*100 : 0;
        const start=acc;
        acc+=share;
        return `${mix(rows.length>1?ci/(rows.length-1):0)} ${start}% ${acc}%`;
      });
      if(acc<100) donutSegments.push(`rgba(157,161,166,0.16) ${acc}% 100%`);
      const legend=rows.slice(0,6).map((c,ci)=>{
        const share=total>0 ? c.value/total*100 : 0;
        return `<button type="button" data-act="chartPick" data-msg="${i}" data-arg="${c.idx}" style="display:flex;align-items:center;gap:8px;background:${c.idx===selected.idx?'rgba(141,198,63,0.10)':'transparent'};border:1px solid ${c.idx===selected.idx?'rgba(141,198,63,0.30)':'rgba(255,255,255,0.05)'};border-radius:9px;padding:8px 10px;cursor:pointer;text-align:left;">
          <span style="width:10px;height:10px;border-radius:3px;background:${mix(rows.length>1?ci/(rows.length-1):0)};flex:none;"></span>
          <span style="min-width:0;flex:1;font-size:12.5px;color:#C9D1D9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.label)}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#8CC63F;">${fmtPct(share)}</span>
        </button>`;
      }).join('');
      const columns=rows.map((c,ci)=>{
        const share=total>0 ? c.value/total*100 : 0;
        const height=Math.max(8,Math.abs(c.value)/max*100);
        const on=c.idx===selected.idx;
        return `<button type="button" data-act="chartPick" data-msg="${i}" data-arg="${c.idx}" title="${esc(c.label)} · ${esc(c.valueFmt)} · ${fmtPct(share)}" style="min-width:64px;flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:8px;background:${on?'rgba(141,198,63,0.08)':'transparent'};border:1px solid ${on?'rgba(141,198,63,0.22)':'transparent'};border-radius:10px;cursor:pointer;padding:8px 5px 7px;">
          <div style="height:170px;width:100%;display:flex;align-items:flex-end;justify-content:center;border-bottom:1px solid rgba(255,255,255,0.10);background:linear-gradient(180deg,rgba(255,255,255,0.025),rgba(255,255,255,0));border-radius:8px 8px 3px 3px;padding:0 4px;">
            <div style="display:block;width:72%;height:${height}%;min-height:8px;border-radius:8px 8px 3px 3px;background:${on?'#8CC63F':mix(rows.length>1?ci/(rows.length-1):0)};box-shadow:${on?'0 0 18px rgba(141,198,63,0.35)':'none'};transition:height .55s cubic-bezier(.2,.8,.2,1);"></div>
          </div>
          <div style="font-size:11px;color:${on?'#fff':'#9DA1A6'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;width:100%;">${esc(c.label)}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;color:${on?'#8CC63F':'#6B7280'};text-align:center;width:100%;">${state.chartMode==='porcentaje'?fmtPct(share):esc(c.valueFmt)}</div>
        </button>`;
      }).join('');
      const chartPanel = state.chartViz==='donut'
        ? `<div style="display:grid;grid-template-columns:minmax(180px,240px) minmax(220px,1fr);gap:16px;align-items:center;background:#0E1320;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;">
            <div style="position:relative;width:min(220px,100%);aspect-ratio:1;margin:auto;border-radius:999px;background:conic-gradient(${donutSegments.join(',')});box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05);">
              <div style="position:absolute;inset:21%;border-radius:999px;background:#0E1320;border:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;text-align:center;">
                <div style="font-size:11px;color:#6B7280;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;">Seleccionado</div>
                <div style="max-width:120px;margin-top:5px;font-size:13px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(selected.label)}</div>
                <div style="margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#8CC63F;">${fmtPct(selectedShare)}</div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:7px;">${legend}</div>
          </div>`
        : state.chartViz==='columnas'
          ? `<div style="background:#0E1320;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:15px;overflow-x:auto;">
              <div style="display:flex;align-items:stretch;gap:10px;min-width:${Math.max(520,rows.length*68)}px;">${columns}</div>
            </div>`
          : `<div style="display:flex;flex-direction:column;gap:6px;">${bars}</div>`;
      body=`<div style="display:flex;flex-direction:column;gap:14px;padding-top:2px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
          <div>
            <div style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#E6E8EC;">${esc(cap(r.chartTitle))}</div>
            <div style="font-size:12.5px;color:#9DA1A6;margin-top:4px;">Ranking comparativo con peso relativo sobre el total visible.</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <div style="display:flex;gap:3px;background:#0E1320;border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:3px;">${vizBtns}</div>
            <div style="display:flex;gap:3px;background:#0E1320;border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:3px;">${modeBtns}</div>
            <div style="display:flex;gap:3px;background:#0E1320;border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:3px;">${sortBtns}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:9px;">
          <div style="background:#0E1320;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:11px 12px;">
            <div style="font-size:10.5px;letter-spacing:0.07em;text-transform:uppercase;color:#6B7280;font-weight:700;">Seleccionado</div>
            <div style="margin-top:5px;font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(selected.label)}</div>
            <div style="margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#8CC63F;">${esc(selected.valueFmt)} · ${fmtPct(selectedShare)}</div>
          </div>
          <div style="background:#0E1320;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:11px 12px;">
            <div style="font-size:10.5px;letter-spacing:0.07em;text-transform:uppercase;color:#6B7280;font-weight:700;">Lider</div>
            <div style="margin-top:5px;font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(top.label)}</div>
            <div style="margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#8CC63F;">${fmtPct(topShare)} del total</div>
          </div>
          <div style="background:#0E1320;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:11px 12px;">
            <div style="font-size:10.5px;letter-spacing:0.07em;text-transform:uppercase;color:#6B7280;font-weight:700;">Total visible</div>
            <div style="margin-top:5px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#fff;">${fmtNum(total.toFixed(total%1?2:0))}</div>
            <div style="margin-top:4px;font-size:12px;color:#9DA1A6;">${n} categorias comparadas</div>
          </div>
        </div>
        ${chartPanel}
      </div>`;
    }
  }

  return `<div style="display:flex;gap:12px;align-self:flex-start;max-width:96%;width:100%;">${avatar}
    <div style="flex:1;min-width:0;background:#161B26;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:6px 18px 18px;box-shadow:0 8px 30px rgba(0,0,0,0.25);">
      ${tabsBar}${body}
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════════════════════════
   EVENTOS (delegación)
   ══════════════════════════════════════════════════════════════════════════════ */
document.addEventListener('click', (e)=>{
  const btn=e.target.closest('[data-act]');
  if(!btn) return;
  const act=btn.dataset.act, arg=btn.dataset.arg;
  switch(act){
    case 'sec':    state.sections[arg]=!state.sections[arg]; render(); break;
    case 'engine': state.engine=arg; render(); break;
    case 'out':    state.show[arg]=!state.show[arg]; render(); break;
    case 'rows':   state.rowsVisible=Number(arg); render(); break;
    case 'tab':    state.messages[Number(btn.dataset.msg)].tab=arg; render(); break;
    case 'chartMode': state.chartMode=arg; render(); break;
    case 'chartSort': state.chartSort=arg; render(); break;
    case 'chartViz': state.chartViz=arg; render(); break;
    case 'chartPick': state.messages[Number(btn.dataset.msg)].chartPick=Number(arg); render(); break;
    case 'ex':     send(EXAMPLES[Number(arg)]); break;
    case 'ask':    send(document.getElementById('q').value); break;
  }
});

document.addEventListener('keydown', (e)=>{
  if(e.target && e.target.id==='q' && e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    send(e.target.value);
  }
});

document.addEventListener('input', (e)=>{
  if(e.target && e.target.id==='q') state.input=e.target.value;  // sin re-render para no perder el cursor
});

/* — Arranque — */
render();
</script>
</body>
</html>
